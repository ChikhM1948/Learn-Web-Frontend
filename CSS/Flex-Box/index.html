<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6 Boxes — Flexbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="flex-container">

    <div class="box box-1">
      <span class="box-icon">🏠</span>
      <p class="box-title">Home</p>
      <p class="box-number">Box 1</p>
    </div>

    <div class="box box-2">
      <span class="box-icon">👤</span>
      <p class="box-title">Profile</p>
      <p class="box-number">Box 2</p>
    </div>

    <div class="box box-3">
      <span class="box-icon">⚙️</span>
      <p class="box-title">Settings</p>
      <p class="box-number">Box 3</p>
    </div>

    <div class="box box-4">
      <span class="box-icon">🔔</span>
      <p class="box-title">Alerts</p>
      <p class="box-number">Box 4</p>
    </div>

    <div class="box box-5">
      <span class="box-icon">✉️</span>
      <p class="box-title">Messages</p>
      <p class="box-number">Box 5</p>
    </div>

    <div class="box box-6">
      <span class="box-icon">⭐</span>
      <p class="box-title">Favorites</p>
      <p class="box-number">Box 6</p>
    </div>

  </div>

</body>
</html>
